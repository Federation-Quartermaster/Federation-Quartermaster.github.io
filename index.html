<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Awards Builder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        
        #builder-tray {
            background-color: #2b2b36;
            border: 2px dashed #555563;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            min-height: 100px;
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        .tray-item {
            position: relative;
            cursor: pointer;
        }

        .tray-item img {
            height: 40px; 
            object-fit: contain;
        }

        .tray-item:hover::after {
            content: "X";
            position: absolute;
            top: -5px; right: -5px;
            background: red; color: white;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        button {
            background-color: #3a3a45; color: white; border: none;
            padding: 10px 20px; margin: 0 5px; font-size: 16px;
            border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #555563; }
        
        .generate-btn {
            background-color: #4CAF50;
            font-weight: bold;
        }
        .generate-btn:hover { background-color: #45a049; }

        #gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; max-width: 1200px; margin: 0 auto;
        }
        
        .award-card {
            background-color: #2b2b36; border: 1px solid #3a3a45;
            border-radius: 8px; padding: 15px; cursor: pointer;
            text-align: center; transition: 0.2s;
        }
        
        .award-card:hover {
            background-color: #3a3a45;
            border-color: #7289da;
        }
        
        .award-card img {
            max-width: 100%; height: 80px;
            object-fit: contain; margin-bottom: 10px;
        }
        
        .award-card h3 { margin: 0; font-size: 14px; }
    </style>
</head>
<body>

    <h2 style="text-align: center;">Rack Builder</h2>
    
    <div id="builder-tray">
        <span id="empty-tray-text" style="color: #aaaaaa;">Select awards below to build your rack...</span>
    </div>

    <div class="controls">
        <button onclick="filterAwards('all')">All</button>
        <button onclick="filterAwards('medal')">Medals</button>
        <button onclick="filterAwards('ribbon')">Ribbons</button>
        <button class="generate-btn" onclick="generateDecal()">Export Rack Decal</button>
    </div>
    
    <div id="gallery-grid"></div>

    <script>
        let allAwards = [];
        let selectedRack = []; 
        
        // Ribbon dimensions for the final output decal
        const RIBBON_WIDTH = 150;
        const RIBBON_HEIGHT = 45;
        const COLUMNS_PER_ROW = 3; // Change this to 4 if you prefer wider racks

        fetch('awards.json')
            .then(res => res.json())
            .then(data => {
                allAwards = data;
                renderGallery(allAwards);
            })
            .catch(err => console.error("Ensure awards.json is valid:", err));

        function renderGallery(awards) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = ''; 
            
            awards.forEach(award => {
                const card = document.createElement('div');
                card.className = 'award-card';
                card.innerHTML = `
                    <img src="${award.image}" alt="${award.name}">
                    <h3>${award.name}</h3>
                `;
                card.onclick = () => addToRack(award);
                grid.appendChild(card);
            });
        }

        function filterAwards(category) {
            if (category === 'all') renderGallery(allAwards);
            else renderGallery(allAwards.filter(a => a.category === category));
        }

        function addToRack(award) {
            selectedRack.push(award);
            renderTray();
        }

        function removeFromRack(index) {
            selectedRack.splice(index, 1);
            renderTray();
        }

        function renderTray() {
            const tray = document.getElementById('builder-tray');
            tray.innerHTML = ''; 

            if (selectedRack.length === 0) {
                tray.innerHTML = '<span id="empty-tray-text" style="color: #aaaaaa;">Select awards below to build your rack...</span>';
                return;
            }

            selectedRack.forEach((award, index) => {
                const item = document.createElement('div');
                item.className = 'tray-item';
                item.innerHTML = `<img src="${award.image}" alt="${award.name}" title="${award.name}">`;
                item.onclick = () => removeFromRack(index);
                tray.appendChild(item);
            });
        }

        // The Engine that merges the images
        async function generateDecal() {
            if (selectedRack.length === 0) {
                alert("Your rack is empty. Please select some awards first.");
                return;
            }

            // Create an invisible canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            // Calculate exact canvas size needed based on number of items
            const rows = Math.ceil(selectedRack.length / COLUMNS_PER_ROW);
            canvas.width = COLUMNS_PER_ROW * RIBBON_WIDTH;
            canvas.height = rows * RIBBON_HEIGHT;

            // Load all images into memory first using Promises
            const imagePromises = selectedRack.map(award => {
                return new Promise((resolve, reject) => {
                    const img = new Image();
                    // Need crossOrigin if fetching from external URLs, fine for local relative paths
                    img.crossOrigin = "Anonymous"; 
                    img.onload = () => resolve(img);
                    img.onerror = () => reject(new Error(`Failed to load ${award.image}`));
                    img.src = award.image;
                });
            });

            try {
                const loadedImages = await Promise.all(imagePromises);

                // Draw each image onto the canvas grid
                loadedImages.forEach((img, index) => {
                    const col = index % COLUMNS_PER_ROW;
                    const row = Math.floor(index / COLUMNS_PER_ROW);
                    
                    const xOffset = col * RIBBON_WIDTH;
                    const yOffset = row * RIBBON_HEIGHT;

                    ctx.drawImage(img, xOffset, yOffset, RIBBON_WIDTH, RIBBON_HEIGHT);
                });

                // Convert canvas to base64 PNG and trigger download
                const exportData = canvas.toDataURL("image/png");
                const downloadLink = document.createElement('a');
                downloadLink.href = exportData;
                downloadLink.download = "Custom_Roblox_Rack.png";
                
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

            } catch (error) {
                console.error("Error generating decal:", error);
                alert("There was a problem generating the image. Check the console for details.");
            }
        }
    </script>
</body>
</html>
