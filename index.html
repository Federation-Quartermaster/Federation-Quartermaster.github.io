<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Awards Library</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        nav { margin-bottom: 30px; }
        nav button {
            background-color: #3a3a45; color: white; border: none;
            padding: 10px 20px; margin: 0 5px; font-size: 16px;
            border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        nav button:hover { background-color: #555563; }
        
        #gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto;
            padding-top: 150px; /* Adds space at the top so popups don't get cut off */
        }

        /* Make the card look like a standard, compact button */
        .award-card {
            background-color: #2b2b36; border: 1px solid #3a3a45;
            border-radius: 8px; padding: 15px; cursor: pointer;
            position: relative; /* Crucial for the popup to anchor correctly */
            transition: background-color 0.2s;
        }
        
        .award-card:hover {
            background-color: #3a3a45;
        }

        /* Hide the image completely, and style it as a popup tooltip */
        .award-card img {
            display: none; /* Hidden by default */
            position: absolute;
            bottom: 120%; /* Pushes the image above the button */
            left: 50%;
            transform: translateX(-50%); /* Centers the popup */
            background-color: #1e1e24;
            border: 1px solid #555563;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
            width: 120px;
            height: 120px;
            object-fit: contain;
            z-index: 100; /* Ensures it renders on top of other buttons */
            pointer-events: none; /* Stops the popup from interfering with clicks */
        }

        /* Show the popup image ONLY when hovering over the card */
        .award-card:hover img {
            display: block;
        }

        .award-card h3 { margin: 0 0 5px 0; font-size: 16px; }
        .award-card p { margin: 0; font-size: 12px; color: #aaaaaa; }
    </style>
</head>
<body>

    <nav>
        <button onclick="filterAwards('all')">All</button>
        <button onclick="filterAwards('medal')">Medals</button>
        <button onclick="filterAwards('ribbon')">Ribbons</button>
    </nav>
    
    <div id="gallery-grid"></div>

    <script>
        let allAwards = [];

        // This line tells the page to read your awards.json file again
        fetch('awards.json')
            .then(response => {
                if (!response.ok) throw new Error("Could not load awards.json");
                return response.json();
            })
            .then(data => {
                allAwards = data;
                renderGallery(allAwards); // Load the gallery once data is ready
            })
            .catch(error => {
                console.error("Error:", error);
                document.getElementById('gallery-grid').innerHTML = "<p>Error loading awards.json. Check the console (F12).</p>";
            });

        function renderGallery(awards) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = ''; 
            
            awards.forEach(award => {
                const card = document.createElement('div');
                card.className = 'award-card';
                card.innerHTML = `
                    <img src="${award.image}" alt="${award.name}" onerror="this.src='https://via.placeholder.com/150?text=Missing+Image'">
                    <h3>${award.name}</h3>
                    <p>Click to download PNG</p>
                `;
                
                card.onclick = () => {
                    const link = document.createElement('a');
                    link.href = award.image;
                    link.download = award.name.replace(/\s+/g, '_') + '.png'; 
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };
                
                grid.appendChild(card);
            });
        }

        function filterAwards(category) {
            if (category === 'all') {
                renderGallery(allAwards);
            } else {
                const filtered = allAwards.filter(a => a.category === category);
                renderGallery(filtered);
            }
        }
    </script>
</body>
</html>
