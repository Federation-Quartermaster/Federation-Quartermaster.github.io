<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Federation Award Builder</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- LANDING PAGE --- */
        #landing-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80vh;
            width: 100%;
        }

        #landing-page h1 {
            font-size: 32px;
            margin-bottom: 40px;
            text-align: center;
        }

        .branch-btn {
            background-color: #3a3a45; color: white; border: 2px solid #555563;
            padding: 20px 40px; margin: 10px; font-size: 24px; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: 0.2s;
            width: 100%; max-width: 500px;
        }

        .branch-btn:hover { background-color: #7289da; border-color: #7289da; }

        /* --- BUILDER PAGE --- */
        #builder-page {
            display: none; /* Hidden until a branch is selected */
            width: 100%;
            max-width: 1200px;
            flex-direction: row;
            gap: 30px;
        }

        .sidebar {
            flex: 1;
            max-width: 400px;
            height: 85vh;
            overflow-y: auto;
            padding-right: 15px;
        }

        .preview-area {
            flex: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- SCROLLING FRAMES (Accordions) --- */
        details {
            background-color: #2b2b36;
            border: 1px solid #3a3a45;
            border-radius: 6px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        summary {
            background-color: #3a3a45;
            padding: 15px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            user-select: none;
        }

        .frame-content {
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        /* --- LIST ITEMS & OPTIONS --- */
        .award-row {
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #3a3a45;
        }
        
        .award-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 16px;
            cursor: pointer;
        }

        .checkbox-label input { margin-right: 10px; width: 18px; height: 18px; }

        .options-panel {
            display: none; /* Hidden until checkbox is checked */
            margin-top: 10px;
            margin-left: 28px;
            padding: 10px;
            background-color: #1e1e24;
            border-radius: 5px;
        }

        .options-panel label { margin-right: 15px; cursor: pointer; }

        /* --- SUBFOLDERS (Divisions/Ministries) --- */
        .subfolder-title {
            font-weight: bold;
            color: #7289da;
            margin: 15px 0 10px 0;
            border-bottom: 1px dashed #555563;
        }

        /* LIVE PREVIEW & 512x512 FRAME */
        #live-preview-container {
            position: relative; 
            width: 512px; 
            height: 512px;
            border: 2px solid #555563; 
            border-radius: 4px; 
            overflow: hidden;
            background-color: #2b2b36;
        }

        #torso-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            user-select: none;
        }

        .rack-item { 
            position: absolute; 
            cursor: pointer;
            transition: 0.1s;
        }
        
        .badge-item { 
            position: absolute; 
            cursor: grab; 
            user-select: none; 
        }

        .removable:hover { opacity: 0.5; outline: 1px solid red; }

        .top-controls { display: flex; justify-content: space-between; width: 100%; margin-bottom: 20px; align-items: center;}
        .back-btn { background-color: #555563; padding: 10px 20px; color: white; border: none; border-radius: 5px; cursor: pointer;}
        .generate-btn { background-color: #4CAF50; padding: 10px 20px; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;}
    </style>
</head>
<body>

    <!-- SCREEN 1: Landing Page -->
    <div id="landing-page">
        <h1>Select Branch Below To Build Award Rack</h1>
        <button class="branch-btn" onclick="openBranch('Government')">Government Rack Builder</button>
        <button class="branch-btn" onclick="openBranch('Military')">Military Rack Builder</button>
        <button class="branch-btn" onclick="openBranch('Miscellaneous')">Miscellaneous Rack Builder</button>
    </div>

    <!-- SCREEN 2: Builder Interface -->
    <div id="builder-page">
        <!-- Sidebar with Scrolling Frames -->
        <div class="sidebar" id="frames-container">
            <!-- Frames injected by JavaScript -->
        </div>

        <!-- Live Preview Area -->
        <div class="preview-area">
            <div class="top-controls" style="flex-wrap: wrap; gap: 10px;">
                <button class="back-btn" onclick="goBack()">&#8592; Change Branch</button>
                <h2 id="branch-title" style="margin: 0; flex-grow: 1; text-align: center;">Branch Rack</h2>
                
                <div style="display: flex; gap: 10px; align-items: center; background: #2b2b36; padding: 5px 10px; border-radius: 5px;">
                    <label style="font-size: 14px;">Uniform Base:</label>
                    <select id="torso-select" onchange="updateTorsoBase()" style="background: #3a3a45; color: white; border: 1px solid #555563; padding: 5px;">
                        <option value="lrtorso_forwebsite.png">Standard Uniform</option>
                        <option value="custom">Upload Custom...</option>
                    </select>
                    <input type="file" id="torso-upload" accept="image/png, image/jpeg" style="display:none;" onchange="handleTorsoUpload(event)">
                </div>

                <!-- NEW LOCK BUTTONS -->
                <button id="lock-medals-btn" style="background-color: #555563; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="toggleLock('medals')">🔓 Lock Medals</button>
                <button id="lock-ribbons-btn" style="background-color: #555563; padding: 10px; color: white; border: none; border-radius: 5px; cursor: pointer;" onclick="toggleLock('ribbons')">🔓 Lock Ribbons</button>

                <button class="generate-btn" onclick="generateDecal()">Export Decal</button>
            </div>
            
            <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">Click preview items to remove them. Drag Badges to position.</p>

            <!-- 128x128 FRAME -->
            <div id="live-preview-container">
                <img id="torso-img" src="lrtorso_forwebsite.png" alt="Torso Base">
            </div>
        </div>
    </div>

    <script>
        // NEW GLOBALS FOR LOCKING & DRAGGING
        let isMedalsLocked = false;
        let isRibbonsLocked = false;
        let medalsOffsetX = 0, medalsOffsetY = 0;
        let ribbonsOffsetX = 0, ribbonsOffsetY = 0;
        let allAwardsData = [];
        let selectedRack = [];
        let currentBranch = "";
        // NEW: Tracks the exact order divisions are clicked
        let activeSubFoldersOrder = [];

        // Simulated Fetch (Replace with fetch('awards.json'))
        // Ensuring Federation Wide has Precedence 1, 2, and 3
        fetch('awards.json')
            .then(res => res.json())
            .then(data => { allAwardsData = data; })
            .catch(err => console.error("Data not loaded. Error:", err));

        // --- NAVIGATION ---
        function openBranch(branchName) {
            currentBranch = branchName;
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('builder-page').style.display = 'flex';
            document.getElementById('branch-title').innerText = `${branchName} Rack`;
            
            selectedRack = []; // Clear rack when switching branches
            renderPreview();
            buildFrames();
        }

        function goBack() {
            document.getElementById('landing-page').style.display = 'flex';
            document.getElementById('builder-page').style.display = 'none';
        }

        // --- DYNAMIC FRAME GENERATOR ---
        function buildFrames() {
            const container = document.getElementById('frames-container');
            container.innerHTML = '';

            // 1. Always Build Federation Wide Frame First (Highest Priority)
            const fedData = allAwardsData.filter(a => a.branch === "Federation Wide");
            if (fedData.length > 0) {
                container.appendChild(createFrame("Federation Wide Awards", groupAndSort(fedData)));
            }

            // 2. Build Selected Branch Frames
            const branchData = allAwardsData.filter(a => a.branch === currentBranch);
            
            // Get unique folders for this branch (e.g., "Awards", "Badges", "Division Awards")
            const folders = [...new Set(branchData.map(a => a.folder))];

            folders.forEach(folderName => {
                const folderData = branchData.filter(a => a.folder === folderName);
                container.appendChild(createFrame(`${currentBranch} - ${folderName}`, groupAndSort(folderData)));
            });
        }

        // Groups data by subFolder (Divisions) and sorts numerically
        function groupAndSort(data) {
            data.sort((a, b) => (a.precedence || 999) - (b.precedence || 999));
            
            const grouped = {};
            data.forEach(item => {
                const key = item.subFolder || "root";
                if (!grouped[key]) grouped[key] = [];
                grouped[key].push(item);
            });
            return grouped;
        }

        // Creates the <details> Accordion Frame
        function createFrame(title, groupedData) {
            const details = document.createElement('details');
            details.open = title.includes("Federation"); // Open Federation by default
            
            const summary = document.createElement('summary');
            summary.innerText = title;
            details.appendChild(summary);

            const content = document.createElement('div');
            content.className = 'frame-content';

            // Iterate through subFolders (Divisions) or 'root'
            for (const [subFolder, items] of Object.entries(groupedData)) {
                if (subFolder !== "root") {
                    const subTitle = document.createElement('div');
                    subTitle.className = 'subfolder-title';
                    subTitle.innerText = subFolder;
                    content.appendChild(subTitle);
                }

                items.forEach(award => {
                    content.appendChild(createAwardRow(award));
                });
            }

            details.appendChild(content);
            return details;
        }

        // Creates the Checkbox + Radio Options workflow
        function createAwardRow(award) {
            const row = document.createElement('div');
            row.className = 'award-row';

            const label = document.createElement('label');
            label.className = 'checkbox-label';
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `chk_${award.id}`;
            
            label.appendChild(checkbox);
            label.appendChild(document.createTextNode(award.name));
            row.appendChild(label);

            const isBadge = award.folder.includes("Badges");
            const hasOptions = award.medalImage || award.ribbonImage; // NEW: Check if variants exist
            
            const optionsPanel = document.createElement('div');
            optionsPanel.className = 'options-panel';
            optionsPanel.id = `opt_${award.id}`;

            // Only build radio buttons if it's not a badge AND it actually has variants
            if (!isBadge && hasOptions) {
                let html = '';
                if (award.medalImage) html += `<label><input type="radio" name="type_${award.id}" value="medal" checked> Medal</label>`;
                if (award.ribbonImage) html += `<label><input type="radio" name="type_${award.id}" value="ribbon" ${!award.medalImage ? 'checked' : ''}> Ribbon</label>`;
                optionsPanel.innerHTML = html;
                row.appendChild(optionsPanel);
            }

            checkbox.addEventListener('change', (e) => {
                if (!isBadge && hasOptions) {
                    optionsPanel.style.display = e.target.checked ? 'block' : 'none';
                }
                updateRackFromUI(award, e.target.checked);
            });

            if (!isBadge && hasOptions) {
                const radios = optionsPanel.querySelectorAll('input[type="radio"]');
                radios.forEach(r => r.addEventListener('change', () => {
                    if (checkbox.checked) updateRackFromUI(award, true);
                }));
            }

            return row;
        }
        

        // --- RACK LOGIC ---
        // --- RACK LOGIC ---
        function updateRackFromUI(award, isAdding) {
            selectedRack = selectedRack.filter(a => a.id !== award.id);

            if (isAdding) {
                const isBadge = award.folder.includes("Badges");
                const hasOptions = award.medalImage || award.ribbonImage;
                let imageToUse = award.image; 

                if (!isBadge && hasOptions) {
                    const selectedRadio = document.querySelector(`input[name="type_${award.id}"]:checked`);
                    const type = selectedRadio ? selectedRadio.value : (award.medalImage ? 'medal' : 'ribbon');
                    imageToUse = type === 'medal' ? award.medalImage : award.ribbonImage;
                }

                // --- 3. VARIANT AUTO-UNCHECK LOGIC ---
                // Looks for standard tier suffixes to prevent wiping out Campaign Citations
                const variantSuffixes = ['Bronze', 'Silver', 'Gold', 'Commander', 'Member', 'Officer'];
                const nameParts = award.name.split(' - ');
                
                if (nameParts.length > 1 && variantSuffixes.includes(nameParts[1])) {
                    const baseName = nameParts[0];
                    const existingVariantIndex = selectedRack.findIndex(a => {
                        const aParts = a.name.split(' - ');
                        return aParts.length > 1 && aParts[0] === baseName && variantSuffixes.includes(aParts[1]);
                    });
                    
                    if (existingVariantIndex !== -1) {
                        const existingId = selectedRack[existingVariantIndex].id;
                        selectedRack.splice(existingVariantIndex, 1); // Remove old tier from array
                        
                        // Uncheck the UI visually
                        const checkbox = document.getElementById(`chk_${existingId}`);
                        if (checkbox) checkbox.checked = false;
                        const optPanel = document.getElementById(`opt_${existingId}`);
                        if (optPanel) optPanel.style.display = 'none';
                    }
                }

                if (award.subFolder && !activeSubFoldersOrder.includes(award.subFolder)) {
                    activeSubFoldersOrder.push(award.subFolder);
                }

                selectedRack.push({
                    ...award,
                    activeImage: imageToUse,
                    x: isBadge ? 100 : null,
                    y: isBadge ? 100 : null
                });
            } else {
                if (award.subFolder) {
                    const stillHasSubFolder = selectedRack.some(a => a.subFolder === award.subFolder);
                    if (!stillHasSubFolder) {
                        activeSubFoldersOrder = activeSubFoldersOrder.filter(sf => sf !== award.subFolder);
                    }
                }
            }
            renderPreview();
        }

        function removeFromRack(id) {
            const itemToRemove = selectedRack.find(a => a.id === id);
            if (itemToRemove) {
                updateRackFromUI(itemToRemove, false); // Route through the main logic to handle subfolder tracking
                const checkbox = document.getElementById(`chk_${id}`);
                if (checkbox) {
                    checkbox.checked = false;
                    const optPanel = document.getElementById(`opt_${id}`);
                    if (optPanel) optPanel.style.display = 'none';
                }
            }
        }

        // --- RENDER & SORT LOGIC ---
        // --- TORSO IMAGE HANDLERS ---
        function updateTorsoBase() {
            const select = document.getElementById('torso-select');
            const upload = document.getElementById('torso-upload');
            const torsoImg = document.getElementById('torso-img');

            if (select.value === 'custom') {
                upload.click();
            } else {
                torsoImg.src = select.value;
            }
        }

        function handleTorsoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('torso-img').src = e.target.result;
                    // Reset dropdown to prevent getting stuck
                    document.getElementById('torso-select').options[1].text = "Custom Loaded"; 
                }
                reader.readAsDataURL(file);
            }
        }

        // --- DYNAMIC RENDERING ALGORITHM ---
        // --- DYNAMIC RENDERING ALGORITHM ---
        // --- LOCK BUTTON HANDLER ---
        function toggleLock(category) {
            if (category === 'medals') {
                isMedalsLocked = !isMedalsLocked;
                const btn = document.getElementById('lock-medals-btn');
                btn.innerHTML = isMedalsLocked ? '🔒 Medals Locked (Drag to Move)' : '🔓 Lock Medals';
                btn.style.backgroundColor = isMedalsLocked ? '#d9534f' : '#555563';
            } else {
                isRibbonsLocked = !isRibbonsLocked;
                const btn = document.getElementById('lock-ribbons-btn');
                btn.innerHTML = isRibbonsLocked ? '🔒 Ribbons Locked (Drag to Move)' : '🔓 Lock Ribbons';
                btn.style.backgroundColor = isRibbonsLocked ? '#d9534f' : '#555563';
            }
            renderPreview();
        }

        // --- GROUP DRAG ENGINE ---
        function makeCategoryDraggable(el, category) {
            let startX, startY;
            
            el.onmousedown = function(e) {
                e.preventDefault();
                startX = e.clientX;
                startY = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };

            function elementDrag(e) {
                e.preventDefault();
                let dx = e.clientX - startX;
                let dy = e.clientY - startY;
                startX = e.clientX;
                startY = e.clientY;
                
                // Applies the drag movement live to every single item in the locked category
                if (category === 'medals') {
                    medalsOffsetX += dx;
                    medalsOffsetY += dy;
                    document.querySelectorAll('.medal-item').forEach(img => {
                        img.style.left = (parseFloat(img.style.left) + dx) + 'px';
                        img.style.top = (parseFloat(img.style.top) + dy) + 'px';
                    });
                } else if (category === 'ribbons') {
                    ribbonsOffsetX += dx;
                    ribbonsOffsetY += dy;
                    document.querySelectorAll('.ribbon-item').forEach(img => {
                        img.style.left = (parseFloat(img.style.left) + dx) + 'px';
                        img.style.top = (parseFloat(img.style.top) + dy) + 'px';
                    });
                }
            }

            function closeDragElement() {
                document.onmouseup = null;
                document.onmousemove = null;
            }
        }

        // --- DYNAMIC RENDERING ALGORITHM ---
        function renderPreview() {
            const container = document.getElementById('live-preview-container');
            container.querySelectorAll('.rack-item, .badge-item').forEach(b => b.remove());

            const rackItems = selectedRack.filter(a => !a.folder.includes("Badges"));
            const badgeItems = selectedRack.filter(a => a.folder.includes("Badges"));

            // Advanced Sort by Precedence
            rackItems.sort((a, b) => {
                if (!a.subFolder && b.subFolder) return -1;
                if (a.subFolder && !b.subFolder) return 1;
                if (!a.subFolder && !b.subFolder) return a.precedence - b.precedence;
                if (a.subFolder && b.subFolder) {
                    const aOrder = activeSubFoldersOrder.indexOf(a.subFolder);
                    const bOrder = activeSubFoldersOrder.indexOf(b.subFolder);
                    if (aOrder !== bOrder) return aOrder - bOrder;
                    return a.precedence - b.precedence;
                }
            });

            // Grouping
            const allRibbons = []; 
            const medals = [];      

            rackItems.forEach(award => {
                const isMedalVariant = award.activeImage === award.medalImage;
                const hasMedalVariant = !!award.medalImage;

                // Any pure ribbon or standard ribbon gets grouped together
                if (!hasMedalVariant || !isMedalVariant) {
                    allRibbons.push(award);
                } else {
                    medals.push(award);
                }
            });

            const hasMedals = medals.length > 0;
            const hasRibbons = allRibbons.length > 0;
            const SCALE = 4; // 128 to 512 Workspace Multiplier

            // 1. RENDER RIBBONS (Building Upwards)
            const ribbonAnchorX = 78;
            const ribbonAnchorY = hasMedals ? 34 : 36;
            const totalRibbonRows = Math.ceil(allRibbons.length / 3);

            allRibbons.forEach((ribbon, index) => {
                const img = document.createElement('img');
                img.src = ribbon.activeImage;
                img.className = 'rack-item removable ribbon-item';
                img.title = ribbon.name;
                
                if (isRibbonsLocked) {
                    img.style.cursor = 'grab';
                    makeCategoryDraggable(img, 'ribbons');
                } else {
                    img.onclick = () => removeFromRack(ribbon.id);
                }
                
                const row = Math.floor(index / 3);
                const col = index % 3;
                
                // Calculates Y axis so the highest precedence is at the top, and bottom is at Y=36
                const yOffset = (totalRibbonRows - 1 - row) * 6;
                
                img.style.left = `${(ribbonAnchorX + (col * 15)) * SCALE + ribbonsOffsetX}px`; 
                img.style.top = `${(ribbonAnchorY - yOffset) * SCALE + ribbonsOffsetY}px`; 
                img.style.width = `${14 * SCALE}px`;
                img.style.zIndex = 500 - index;
                
                container.appendChild(img);
            });

            // 2. RENDER MEDALS (Building Downwards)
            const medalAnchorX = hasRibbons ? 1 : 77;
            const medalAnchorY = 36;

            medals.forEach((medal, index) => {
                const img = document.createElement('img');
                img.src = medal.activeImage;
                img.className = 'rack-item removable medal-item';
                img.title = medal.name;
                
                if (isMedalsLocked) {
                    img.style.cursor = 'grab';
                    makeCategoryDraggable(img, 'medals');
                } else {
                    img.onclick = () => removeFromRack(medal.id);
                }
                
                const row = Math.floor(index / 6);
                const col = index % 6;
                
                img.style.left = `${(medalAnchorX + (col * 6)) * SCALE + medalsOffsetX}px`;
                img.style.top = `${(medalAnchorY + (row * 6)) * SCALE + medalsOffsetY}px`;
                img.style.width = `${14 * SCALE}px`;
                img.style.zIndex = 1000 - index; 
                
                container.appendChild(img);
            });

            // 3. RENDER BADGES
            badgeItems.forEach(badge => {
                const img = document.createElement('img');
                img.src = badge.activeImage;
                img.className = 'badge-item removable';
                img.title = badge.name;
                img.style.width = `${16 * SCALE}px`; 
                img.style.left = (badge.x !== null ? badge.x : (56 * SCALE)) + 'px'; 
                img.style.top = (badge.y !== null ? badge.y : (10 * SCALE)) + 'px';
                img.style.zIndex = 2000;
                img.ondblclick = () => removeFromRack(badge.id);
                makeDraggable(img, badge);
                container.appendChild(img);
            });
        }

        // Passes SCALE multiplier to gap sizing
        function renderRibbonGrid(ribbonArray, startX, startY, container, SCALE) {
            ribbonArray.forEach((ribbon, index) => {
                const img = document.createElement('img');
                img.src = ribbon.activeImage;
                img.className = 'rack-item removable';
                img.title = ribbon.name;
                img.onclick = () => removeFromRack(ribbon.id);
                
                const row = Math.floor(index / 3);
                const col = index % 3;
                
                // Base 15px/6px gaps multiplied by SCALE
                img.style.left = `${startX + (col * (15 * SCALE))}px`; 
                img.style.top = `${startY + (row * (6 * SCALE))}px`; 
                img.style.width = `${14 * SCALE}px`;
                img.style.zIndex = 500 - index;
                
                container.appendChild(img);
            });
        }
        // Drag and Drop (Preserved)
        function makeDraggable(elmnt, badgeData) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = (e) => {
                e.preventDefault();
                pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = closeDragElement;
                document.onmousemove = elementDrag;
            };
            function elementDrag(e) {
                e.preventDefault();
                pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                pos3 = e.clientX; pos4 = e.clientY;
                elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
            }
            function closeDragElement() {
                document.onmouseup = null; document.onmousemove = null;
                badgeData.x = elmnt.offsetLeft; badgeData.y = elmnt.offsetTop;
            }
        }

        // --- CANVAS EXPORT ---
        // --- 128x128 CANVAS EXPORTER ---
        // --- 128x128 CANVAS EXPORTER ---
        async function generateDecal() {
            if (selectedRack.length === 0) {
                alert("Please add awards to the preview first.");
                return;
            }

            const container = document.getElementById('live-preview-container');
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            // STRICTLY enforce the 128x128 export size
            canvas.width = 128;
            canvas.height = 128;

            try {
                // NOTE: The torso drawing code has been completely deleted here.
                // The canvas will remain completely transparent behind the awards.
                
                const domItems = Array.from(container.querySelectorAll('.rack-item, .badge-item'));
                domItems.sort((a, b) => parseInt(a.style.zIndex || 0) - parseInt(b.style.zIndex || 0));
                
                const SCALE = 4; // Divider to convert DOM 512px sizing back to 128px export sizing

                for (let i = 0; i < domItems.length; i++) {
                    const imgEl = domItems[i];
                    const img = new Image();
                    img.crossOrigin = "Anonymous";
                    await new Promise(resolve => { img.onload = resolve; img.src = imgEl.src; });
                    
                    // Divide all positional values by the SCALE to compress it perfectly to 128x128
                    const left = parseFloat(imgEl.style.left || 0) / SCALE;
                    const top = parseFloat(imgEl.style.top || 0) / SCALE;
                    const width = (imgEl.offsetWidth || (14 * SCALE)) / SCALE;
                    
                    // Calculate height based on proportional width scale to prevent distortion
                    const height = Math.round(width * (img.height / img.width)) || 14; 
                    
                    ctx.drawImage(img, left, top, width, height);
                }

                const exportData = canvas.toDataURL("image/png");
                const downloadLink = document.createElement('a');
                downloadLink.href = exportData;
                downloadLink.download = "Custom_Roblox_Uniform_Decal.png";
                document.body.appendChild(downloadLink);
                downloadLink.click();
                document.body.removeChild(downloadLink);

            } catch (error) {
                console.error("Error generating decal:", error);
                alert("Failed to compile the image.");
            }
        }
    </script>
</body>
</html>
