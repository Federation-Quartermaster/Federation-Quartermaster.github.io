<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Awards Library</title>
    
    <!-- CSS is now embedded directly so it cannot fail to load -->
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        nav { margin-bottom: 30px; }
        nav button {
            background-color: #3a3a45; color: white; border: none;
            padding: 10px 20px; margin: 0 5px; font-size: 16px;
            border-radius: 5px; cursor: pointer; transition: 0.2s;
        }
        nav button:hover { background-color: #555563; }
        
        #gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; max-width: 1200px; margin: 0 auto;
        }
        .award-card {
            background-color: #2b2b36; border: 1px solid #3a3a45;
            border-radius: 8px; padding: 15px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .award-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.3);
        }
        .award-card img {
            max-width: 100%; height: auto; max-height: 150px;
            object-fit: contain; margin-bottom: 10px;
        }
        .award-card h3 { margin: 10px 0 5px 0; font-size: 18px; }
        .award-card p { margin: 0; font-size: 12px; color: #aaaaaa; }
    </style>
</head>
<body>

    <!-- The Navigation Buttons -->
    <nav>
        <button onclick="filterAwards('all')">All</button>
        <button onclick="filterAwards('medal')">Medals</button>
        <button onclick="filterAwards('ribbon')">Ribbons</button>
    </nav>
    
    <!-- Where the awards will be injected -->
    <div id="gallery-grid"></div>

    <!-- JavaScript is now embedded directly -->
    <script>
        // Data is hardcoded here, so no JSON file is needed to start!
        // Just add your actual file names into the 'image' paths below.
        const allAwards = [
            { name: "Medal of Honor", category: "medal", image: "assets/medals/moh.png" },
            { name: "Combat Action Ribbon", category: "ribbon", image: "assets/ribbons/combat_action.png" }
        ];

        function renderGallery(awards) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = ''; 
            
            awards.forEach(award => {
                const card = document.createElement('div');
                card.className = 'award-card';
                card.innerHTML = `
                    <img src="${award.image}" alt="${award.name}" onerror="this.src='https://via.placeholder.com/150?text=Image+Not+Found'">
                    <h3>${award.name}</h3>
                    <p>Click to download PNG</p>
                `;
                
                // Downloads the image automatically
                card.onclick = () => {
                    const link = document.createElement('a');
                    link.href = award.image;
                    link.download = award.name.replace(/\s+/g, '_') + '.png'; 
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                };
                
                grid.appendChild(card);
            });
        }

        function filterAwards(category) {
            if (category === 'all') {
                renderGallery(allAwards);
            } else {
                const filtered = allAwards.filter(a => a.category === category);
                renderGallery(filtered);
            }
        }

        // Initialize the page with all awards
        renderGallery(allAwards);
    </script>
</body>
</html>
