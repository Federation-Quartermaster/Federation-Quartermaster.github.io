name: Update Database

on:
  issues:
    types: [opened]

jobs:
  update-database:
    if: contains(github.event.issue.labels.*.name, 'add-medal')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Run Update Script
        run: python update_script.py "${{ github.event.issue.body }}"
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add MedalDatabase/datastore.json
          git commit -m "Update DB from Issue #${{ github.event.issue.number }}"
          git push
      - name: Close Issue
        uses: peter-evans/close-issue@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          comment: "Database updated successfully!"
